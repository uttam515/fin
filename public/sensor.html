<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SHM Sensor Node</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; 
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .header p { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 3px; margin-top: 6px; }
        .status-bar { 
            width: 100%; max-width: 400px; padding: 16px 20px; 
            border: 1px solid #222; border-radius: 16px; margin-bottom: 30px; 
            font-size: 13px; display: flex; flex-direction: column; gap: 8px; background: #0a0a0a;
        }
        .status-row { display: flex; justify-content: space-between; align-items: center; }
        .status-row .label { color: #555; font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; }
        .status-row .value { font-weight: 700; font-variant-numeric: tabular-nums; }
        .connected { color: #22c55e; }
        .disconnected { color: #ef4444; }
        .kicked { color: #ef4444; }
        .btn { 
            width: 100%; max-width: 400px; height: 80px; font-size: 16px; font-weight: 800;
            background: linear-gradient(135deg, #2563eb, #7c3aed); color: #fff; border: none;
            border-radius: 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 0 40px -10px rgba(37,99,235,0.5);
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.3; }
        .readings { 
            width: 100%; max-width: 400px; margin-top: 30px;
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
        }
        .axis-card {
            background: #0a0a0a; border: 1px solid #222; border-radius: 16px;
            padding: 20px 12px; text-align: center;
        }
        .axis-card .axis-label { font-size: 10px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .axis-card .axis-value { font-size: 28px; font-weight: 900; margin-top: 8px; font-variant-numeric: tabular-nums; }
        .x-color { color: #3b82f6; }
        .y-color { color: #a855f7; }
        .z-color { color: #22c55e; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏗️ SHM Sensor Node</h1>
        <p>Passive Vibration Sensing</p>
    </div>
    
    <div class="status-bar">
        <div class="status-row">
            <span class="label">Sensor</span>
            <span class="value" id="status">Ready</span>
        </div>
        <div class="status-row">
            <span class="label">Network</span>
            <span class="value" id="wsStatus">Connecting...</span>
        </div>
        <div class="status-row">
            <span class="label">Packets Sent</span>
            <span class="value" id="eventCount">0</span>
        </div>
    </div>

    <button class="btn" id="startBtn" onclick="startSensing()">Start Sensing</button>

    <div class="readings">
        <div class="axis-card">
            <div class="axis-label">X-Axis</div>
            <div class="axis-value x-color" id="xVal">—</div>
        </div>
        <div class="axis-card">
            <div class="axis-label">Y-Axis</div>
            <div class="axis-value y-color" id="yVal">—</div>
        </div>
        <div class="axis-card">
            <div class="axis-label">Z-Axis</div>
            <div class="axis-value z-color" id="zVal">—</div>
        </div>
    </div>

    <script>
        const socket = io();
        let emitCount = 0;

        socket.on("connect", () => {
            document.getElementById("wsStatus").innerText = "Connected ✅";
            document.getElementById("wsStatus").className = "value connected";
        });
        
        socket.on("disconnect", () => {
            document.getElementById("wsStatus").innerText = "Disconnected ❌";
            document.getElementById("wsStatus").className = "value disconnected";
        });

        // ── EMA with ALPHA = 0.4 ──
        // 0.4 = HIGH SENSITIVITY. 40% of each raw reading passes through instantly.
        // Stabilization is handled on the DASHBOARD side (FFT windowing + bin smoothing).
        let smoothedX = 0, smoothedY = 0, smoothedZ = 0;
        const ALPHA = 0.4;

        socket.on("kicked", () => {
            if (window.DeviceMotionEvent) {
                window.removeEventListener("devicemotion", handleMotion, true);
            }
            socket.disconnect();
            document.getElementById("status").innerText = "Ejected by Admin";
            document.getElementById("status").className = "value kicked";
            document.getElementById("wsStatus").innerText = "Severed";
            document.getElementById("wsStatus").className = "value kicked";
            document.getElementById("startBtn").disabled = true;
        });

        function handleMotion(e) {
            // PREFER acceleration (gravity-removed) for pure vibration sensing
            // Resting phone: x=0, y=0, z=0
            // Gentle tap: z=±0.5   |   Hard shake: z=±10
            const acc = e.acceleration || e.accelerationIncludingGravity;
            if (!acc) return;

            const rawX = acc.x || 0;
            const rawY = acc.y || 0;
            const rawZ = acc.z || 0;

            // EMA only for the phone's own display (so numbers don't flicker on screen)
            smoothedX = (0.3 * rawX) + (0.7 * smoothedX);
            smoothedY = (0.3 * rawY) + (0.7 * smoothedY);
            smoothedZ = (0.3 * rawZ) + (0.7 * smoothedZ);

            // Emit RAW unfiltered data to the dashboard at ~30 Hz
            // The FFT needs the raw vibration signal to detect frequency peaks!
            emitCount++;
            if (emitCount % 2 === 0) {
                document.getElementById("xVal").innerText = smoothedX.toFixed(2);
                document.getElementById("yVal").innerText = smoothedY.toFixed(2);
                document.getElementById("zVal").innerText = smoothedZ.toFixed(2);
                document.getElementById("eventCount").innerText = Math.floor(emitCount / 2);
                
                if (socket.connected) {
                    socket.emit("vibration_data", { x: rawX, y: rawY, z: rawZ });
                }
            }
        }

        async function startSensing() {
            document.getElementById("status").innerText = "Requesting Permission...";
            
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission !== 'granted') {
                        document.getElementById("status").innerText = "Permission Denied";
                        document.getElementById("status").className = "value disconnected";
                        return;
                    }
                } catch (err) {
                    document.getElementById("status").innerText = "Error: " + err;
                    document.getElementById("status").className = "value disconnected";
                    return;
                }
            }

            document.getElementById("status").innerText = "Sensors Active ✅";
            document.getElementById("status").className = "value connected";
            document.getElementById("startBtn").disabled = true;
            document.getElementById("startBtn").style.opacity = "0.3";
            
            if (window.DeviceMotionEvent) {
                window.addEventListener("devicemotion", handleMotion, true);
            } else {
                document.getElementById("status").innerText = "No Sensor API";
                document.getElementById("status").className = "value disconnected";
            }
        }
    </script>
</body>
</html>

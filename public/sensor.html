<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BHS | INDUSTRIAL SENSOR</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0070f3;
            --secondary: #a855f7;
            --accent: #22c55e;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            overflow: hidden;
        }

        /* Abstract Background Elements */
        .blur-vortex {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
        }

        .header { margin-bottom: 30px; position: relative; }
        .brand { font-weight: 900; font-size: 14px; letter-spacing: 6px; color: var(--primary); margin-bottom: 8px; }
        .title { font-size: 32px; font-weight: 900; line-height: 1; letter-spacing: -1px; }

        .dashboard-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Oscilloscope View */
        .oscilloscope {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            height: 160px;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; }
        .osc-label { font-size: 10px; font-weight: 900; color: #444; position: absolute; top: 15px; left: 20px; text-transform: uppercase; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            position: relative;
        }
        .stat-label { font-size: 10px; color: #666; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: #fff; }

        .broadcast-hub {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            position: relative;
            margin-top: auto;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            transition: 0.3s;
        }
        .status-dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .main-btn {
            width: 100%;
            padding: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
        }
        .main-btn:active { transform: scale(0.95); opacity: 0.9; }
        .main-btn.active { background: var(--primary); color: #fff; }

        /* HUD Components */
        .hud-scan {
            position: absolute;
            top: -10px;
            right: 20px;
            font-family: 'JetBrains Mono';
            font-size: 8px;
            color: #333;
            text-align: right;
        }

        .axis-indicators {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .axis-val { font-size: 14px; font-family: 'JetBrains Mono'; font-weight: 700; }
        .axis-x { color: var(--primary); }
        .axis-y { color: var(--secondary); }
        .axis-z { color: var(--accent); }
    </style>
</head>
<body>
    <div class="blur-vortex"></div>
    
    <header class="header">
        <div class="brand">SYSTEM.CORE / BHS</div>
        <h1 class="title">INFRASTRUCTURE<br>TELEMETRY</h1>
        <div class="hud-scan" id="hud-time">--:--:--</div>
    </header>

    <div class="dashboard-container">
        <div class="oscilloscope">
            <div class="osc-label">Live Waveform Feedback</div>
            <canvas id="waveCanvas"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Network Link</div>
                <div class="stat-val" id="net-status">OFFLINE</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Integrity State</div>
                <div class="stat-val" id="sense-status">STBY</div>
            </div>
        </div>

        <div class="broadcast-hub">
            <div style="font-size: 12px; font-weight: 700; color: #555;">
                <span class="status-dot" id="dot"></span>
                <span id="label">SYSTEM IDLE</span>
            </div>
            
            <div class="axis-indicators">
                <div class="axis-x">X: <span id="x">0.0</span></div>
                <div class="axis-y">Y: <span id="y">0.0</span></div>
                <div class="axis-z">Z: <span id="z">0.0</span></div>
            </div>

            <button class="main-btn" id="btn" onclick="toggle()">Initialize Broadcast</button>
        </div>
    </div>

    <script>
        let socket;
        let active = false;
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let points = [];

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.onresize = resize;
        resize();

        try {
            socket = io();
            socket.on('connect', () => {
                document.getElementById('net-status').innerText = 'SECURE';
                document.getElementById('net-status').style.color = '#0070f3';
            });
        } catch(e) {}

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#0070f3';
            ctx.lineWidth = 2;
            const step = canvas.width / 50;
            for(let i=0; i<points.length; i++) {
                const x = i * step;
                const y = (canvas.height/2) + (points[i] * 5);
                if(i===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.stroke();
            requestAnimationFrame(draw);
        }
        draw();

        setInterval(() => {
            const d = new Date();
            document.getElementById('hud-time').innerText = d.getHours() + ":" + d.getMinutes() + ":" + d.getSeconds() + " UTC";
        }, 1000);

        function toggle() {
            if(active) { location.reload(); return; }
            
            if (window.DeviceMotionEvent) {
                active = true;
                const btn = document.getElementById('btn');
                btn.innerText = "Terminate Link";
                btn.classList.add('active');
                document.getElementById('dot').classList.add('active');
                document.getElementById('label').innerText = "BROADCASTING DATA";
                document.getElementById('sense-status').innerText = "LIVE";
                document.getElementById('sense-status').style.color = "#22c55e";

                window.addEventListener("devicemotion", (e) => {
                    const acc = e.accelerationIncludingGravity;
                    if (acc) {
                        const x = acc.x || 0;
                        const y = acc.y || 0;
                        const z = acc.z || 0;
                        
                        document.getElementById('x').innerText = x.toFixed(1);
                        document.getElementById('y').innerText = y.toFixed(1);
                        document.getElementById('z').innerText = z.toFixed(1);
                        
                        points.push(z - 9.8);
                        if(points.length > 50) points.shift();

                        if (socket && socket.connected) {
                            socket.emit('vibration_data', { x, y, z, timestamp: Date.now() });
                        }
                    }
                }, true);
            }
        }
    </script>
</body>
</html>
